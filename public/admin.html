<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Admin · Simply Manna</title>
<link rel="stylesheet" href="styles.css" />
<style>
  body { background: #0c0a14; color: #ece8d8; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 0; min-height: 100vh; }
  .admin-shell { max-width: 1240px; margin: 0 auto; padding: 24px; }
  .admin-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid rgba(201,161,74,.2); margin-bottom: 24px; }
  .admin-header h1 { margin: 0; font-size: 1.5rem; color: #c9a14a; }
  .admin-header .role-badge { background: rgba(201,161,74,.15); padding: 4px 12px; border-radius: 12px; font-size: 0.8rem; color: #c9a14a; }
  .admin-tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,.08); }
  .admin-tab { padding: 10px 18px; background: none; border: none; color: #a8a395; cursor: pointer; font-size: 0.95rem; border-bottom: 2px solid transparent; transition: all .15s; }
  .admin-tab:hover { color: #ece8d8; }
  .admin-tab.active { color: #c9a14a; border-bottom-color: #c9a14a; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .stat-card { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 12px; padding: 16px; }
  .stat-card .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #a8a395; margin-bottom: 6px; }
  .stat-card .value { font-size: 1.8rem; font-weight: 600; color: #ece8d8; }
  .stat-card .delta { font-size: 0.8rem; color: #7ac57a; margin-top: 4px; }
  .stat-card.warn .value { color: #e8a878; }
  .stat-card.danger .value { color: #d96868; }
  table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,.03); border-radius: 8px; overflow: hidden; }
  th { text-align: left; padding: 12px 14px; background: rgba(255,255,255,.05); font-size: 0.8rem; color: #a8a395; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  td { padding: 12px 14px; border-top: 1px solid rgba(255,255,255,.06); font-size: 0.9rem; }
  tr:hover td { background: rgba(255,255,255,.02); }
  .pill { padding: 2px 10px; border-radius: 10px; font-size: 0.75rem; }
  .pill.visible { background: rgba(122,197,122,.15); color: #7ac57a; }
  .pill.flagged { background: rgba(232,168,120,.15); color: #e8a878; }
  .pill.removed { background: rgba(217,104,104,.15); color: #d96868; }
  .pill.admin { background: rgba(201,161,74,.2); color: #c9a14a; }
  .pill.moderator { background: rgba(120,170,232,.15); color: #78aae8; }
  .pill.banned { background: rgba(217,104,104,.15); color: #d96868; }
  .btn { padding: 6px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.04); color: #ece8d8; cursor: pointer; font-size: 0.85rem; margin-right: 6px; }
  .btn:hover { background: rgba(255,255,255,.08); }
  .btn.primary { background: #c9a14a; color: #0c0a14; border-color: #c9a14a; }
  .btn.danger { background: rgba(217,104,104,.15); color: #d96868; border-color: rgba(217,104,104,.4); }
  .btn.danger:hover { background: rgba(217,104,104,.3); }
  .panel { display: none; }
  .panel.active { display: block; }
  .search-bar { margin-bottom: 16px; display: flex; gap: 8px; }
  .search-bar input, .search-bar select { padding: 8px 12px; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: 6px; color: #ece8d8; flex: 1; max-width: 360px; }
  .empty { padding: 40px; text-align: center; color: #a8a395; }
  .signin-prompt { max-width: 480px; margin: 100px auto; padding: 32px; background: rgba(255,255,255,.04); border-radius: 12px; text-align: center; }
  .signin-prompt h2 { color: #c9a14a; margin-top: 0; }
  .signin-prompt a { color: #c9a14a; }
  .comment-text { max-width: 360px; color: #d8d3c5; white-space: normal; }
  .meta { color: #a8a395; font-size: 0.78rem; }
</style>
</head>
<body>
  <div class="admin-shell">
    <div id="admin-root">
      <div class="empty">Loading…</div>
    </div>
  </div>
  <script type="module" src="src/admin/admin.js"></script>
</body>
</html>

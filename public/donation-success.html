<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Thank You! — Taste Manna</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="ambient">
    <div class="ambient-blob ambient-blob--a"></div>
    <div class="ambient-blob ambient-blob--b"></div>
    <div class="ambient-blob ambient-blob--c"></div>
    <div class="ambient-grain"></div>
  </div>

  <div style="display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; padding: 20px;">
    <div style="max-width: 400px;">
      <div style="font-size: 80px; margin-bottom: 20px; animation: bounce 1s infinite;">🙏</div>
      <h1 style="font-size: 32px; font-weight: 700; margin-bottom: 12px; color: var(--ink);">Thank You!</h1>
      <p style="font-size: 16px; color: var(--muted); margin-bottom: 24px; line-height: 1.5;">Your donation helps us reach more people with Scripture discovery. You're now part of the Taste Manna mission.</p>

      <div style="background: linear-gradient(135deg, rgba(102,126,234,.1), rgba(118,75,162,.1)); border: 1px solid rgba(201,161,74,.2); border-radius: 12px; padding: 16px; margin-bottom: 20px; font-size: 13px; line-height: 1.6; color: var(--muted);">
        <strong style="color: var(--gold);">💡 What's next:</strong><br>
        ✓ You'll receive a receipt in your email<br>
        ✓ Your support unlocks exclusive features<br>
        ✓ Help us grow the community
      </div>

      <a href="/index.html" style="display: inline-block; background: var(--gold); color: #2a1d05; padding: 12px 32px; border-radius: 8px; font-weight: 700; text-decoration: none; cursor: pointer; border: 0;">Return to Taste Manna</a>
    </div>
  </div>

  <style>
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</body>
</html>

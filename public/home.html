<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Home — Simply Manna</title>
  <link rel="icon" href="/assets/logo-64.png" type="image/png" />
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="page-scroll">
  <div class="ambient">
    <div class="ambient-blob ambient-blob--a"></div>
    <div class="ambient-blob ambient-blob--b"></div>
    <div class="ambient-blob ambient-blob--c"></div>
    <div class="ambient-grain"></div>
  </div>

  <div class="topbar">
    <div class="brand">
      <img class="logo" src="/logo.png" alt="" width="32" height="32" />
      <span>Simply Manna</span>
    </div>
    <nav class="page-nav">
      <a href="/index.html" class="page-nav-link">For You</a>
      <a href="/home.html" class="page-nav-link active">Home</a>
      <a href="/leaderboard.html" class="page-nav-link">Leaderboard</a>
      <a href="/upgrade.html" class="page-nav-link">Premium</a>
      <a href="/donate.html" class="page-nav-link">Donate</a>
    </nav>
    <div class="topbar-right">
      <button class="account-btn" id="accountBtn"></button>
    </div>
  </div>

  <div class="container main-with-nav" id="homeContent" style="padding-top: 80px;">
    <!-- Hero section: Welcome + Streak + Level -->
    <div class="home-hero" id="homeHero">
      <div class="home-hero-greeting" id="heroGreeting">Welcome back!</div>
      <div class="home-hero-streak" id="heroStreak">🔥 Start your streak today!</div>

      <div class="home-hero-level" id="levelCard">
        <div class="home-hero-level-badge" id="levelBadge">1</div>
        <div class="home-hero-level-text">
          <div class="home-hero-level-title">Level <span id="levelText">1</span> Explorer</div>
          <div class="home-hero-level-xp">
            <span id="xpText">0</span> / <span id="nextXpText">500</span> XP
          </div>
        </div>
      </div>
    </div>

    <!-- Recent achievements -->
    <div id="recentAchievementsSection" style="display: none;">
      <div class="home-achievements">
        <div class="home-achievements-label">Recent</div>
        <div class="home-achievements-list" id="recentAchievements"></div>
      </div>
    </div>

    <!-- Weekly challenges -->
    <div style="margin-bottom: 20px;">
      <h2 style="font-size: 15px; font-weight: 700; margin-bottom: 12px; color: var(--gold); text-transform: uppercase; letter-spacing: .6px;">This Week's Challenges</h2>
      <div id="challengesContainer"></div>
    </div>

    <!-- All achievements gallery -->
    <div style="margin-bottom: 20px;">
      <h2 style="font-size: 15px; font-weight: 700; margin-bottom: 12px; color: var(--gold); text-transform: uppercase; letter-spacing: .6px;">All Achievements</h2>
      <div class="achievements-grid" id="achievementsGrid"></div>
    </div>
  </div>

  <div id="welcome"></div>

  <nav class="bottom-nav">
    <a href="/index.html" class="bottom-nav-item"><div class="bottom-nav-label">For You</div></a>
    <a href="/home.html" class="bottom-nav-item active"><div class="bottom-nav-label">Home</div></a>
    <a href="/leaderboard.html" class="bottom-nav-item"><div class="bottom-nav-label">Leaderboard</div></a>
    <a href="/upgrade.html" class="bottom-nav-item"><div class="bottom-nav-label">Premium</div></a>
    <a href="/donate.html" class="bottom-nav-item"><div class="bottom-nav-label">Donate</div></a>
  </nav>

  <script type="module">
    import { initPageAccount } from "/src/core/pageAccount.js";
    import { openAuthPanel } from "/src/ui/components/welcome.js";

    async function loadHome() {
      try {
        const [homeData, achData, chalData] = await Promise.all([
          fetch('/api/home').then(r => r.json()),
          fetch('/api/achievements').then(r => r.json()),
          fetch('/api/challenges').then(r => r.json()),
        ]);

        if (!homeData.greeting) {
          return;
        }

        // Hero section
        document.getElementById('heroGreeting').textContent = homeData.greeting;
        document.getElementById('heroStreak').innerHTML = homeData.streakDays > 0
          ? `🔥 ${homeData.streakDays}-day streak!`
          : '✨ Start your streak today!';

        document.getElementById('levelBadge').textContent = homeData.level;
        document.getElementById('levelText').textContent = homeData.level;
        document.getElementById('xpText').textContent = homeData.totalXP;
        document.getElementById('nextXpText').textContent = homeData.level * 500;

        const xpPercent = (homeData.totalXP % 500) / 5;
        document.getElementById('levelCard').insertAdjacentHTML('beforeend',
          `<div style="position: absolute; bottom: 12px; left: 12px; right: 12px;">
            <div class="xp-bar" style="margin: 0;">
              <div class="xp-bar-track" style="flex: 1;">
                <div class="xp-bar-fill" style="width: ${Math.min(xpPercent, 100)}%"></div>
              </div>
            </div>
          </div>`);

        // Recent achievements
        if (homeData.recentAchievements.length > 0) {
          document.getElementById('recentAchievementsSection').style.display = 'block';
          const recentList = document.getElementById('recentAchievements');
          homeData.recentAchievements.forEach(ach => {
            recentList.insertAdjacentHTML('beforeend',
              `<div class="home-achievements-badge" title="${ach.name}">${ach.icon}</div>`);
          });
        }

        // Weekly challenges
        const chalContainer = document.getElementById('challengesContainer');
        if (chalData.challenges.length === 0) {
          chalContainer.innerHTML = '<p style="color: var(--muted); font-size: 13px;">No challenges this week yet.</p>';
        } else {
          chalData.challenges.forEach(ch => {
            const userProgress = chalData.userProgress.find(p => p.challengeId === ch.id);
            const progress = userProgress?.progress || 0;
            const completed = userProgress?.completed || false;
            const percent = Math.min((progress / ch.goal) * 100, 100);

            chalContainer.insertAdjacentHTML('beforeend', `
              <div class="challenge-card${completed ? ' is-completed' : ''}">
                <div class="challenge-card-head">
                  <div class="challenge-card-title">${ch.name}</div>
                  <div class="challenge-card-xp">+${ch.xpReward} XP</div>
                </div>
                <div class="challenge-card-desc">${ch.description}</div>
                <div class="challenge-progress">
                  <div class="challenge-progress-bar">
                    <div class="challenge-progress-fill" style="width: ${percent}%"></div>
                  </div>
                  <div class="challenge-progress-text">${progress}/${ch.goal}</div>
                </div>
              </div>
            `);
          });
        }

        // All achievements
        const achGrid = document.getElementById('achievementsGrid');
        achData.achievements.forEach(ach => {
          const initial = (ach.name || 'A')[0].toUpperCase();
          achGrid.insertAdjacentHTML('beforeend', `
            <div class="achievement-card${ach.isUnlocked ? ' unlocked' : ''}">
              <div class="achievement-card-icon">${initial}</div>
              <div class="achievement-card-body">
                <div class="achievement-card-name">${ach.name}</div>
                <div class="achievement-card-desc">${ach.description}</div>
                ${!ach.isUnlocked ? '<div class="achievement-card-locked">Locked</div>' : ''}
              </div>
            </div>
          `);
        });

      } catch (err) {
        console.error('Error loading home:', err);
      }
    }

    // Setup auth
    const pageAccount = await initPageAccount(document.getElementById('accountBtn'));
    const session = pageAccount.getSession();
    if (!session?.user) {
      document.getElementById('homeContent').innerHTML = `
        <div style="text-align: center; padding: 60px 20px;">
          <div style="font-size: 18px; font-weight: 700; margin-bottom: 8px;">Sign in to see your progress</div>
          <p style="color: var(--muted); font-size: 13px; margin-bottom: 20px;">Track XP, streaks, and achievements once you're signed in.</p>
          <button class="cm-mini cm-mini--primary" id="homeSignInBtn" style="padding: 10px 24px;">Sign in</button>
        </div>`;
      document.getElementById('homeSignInBtn').addEventListener('click', () => openAuthPanel({ mode: "login", dismissible: true }));
    } else {
      loadHome();
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Daily Reading — Simply Manna</title>
  <link rel="icon" href="/assets/logo-64.png" type="image/png" />
  <link rel="stylesheet" href="/styles.css">
  <style>
    .rp-wrap { max-width: 680px; margin: 0 auto; padding: calc(env(safe-area-inset-top) + 92px) 20px 100px; }

    /* ── Hero header ── */
    .rp-hero { background: linear-gradient(160deg, rgba(201,161,74,.14), rgba(91,83,184,.08)); border: 1px solid rgba(201,161,74,.25); border-radius: 24px; padding: 26px 24px; margin-bottom: 20px; position: relative; overflow: hidden; }
    .rp-hero::before { content: ""; position: absolute; inset: 0; background: repeating-linear-gradient(45deg, rgba(255,255,255,.04) 0px, rgba(255,255,255,.04) 1px, transparent 1px, transparent 22px); }
    .rp-hero-top { display: flex; justify-content: space-between; align-items: flex-start; position: relative; margin-bottom: 18px; }
    .rp-day-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--gold); background: rgba(201,161,74,.16); border: 1px solid rgba(201,161,74,.3); padding: 6px 13px; border-radius: 999px; }
    .rp-streak { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 700; color: var(--ink); }
    .rp-streak-flame { font-size: 15px; }

    .rp-book-row { position: relative; display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
    .rp-book-icon { width: 52px; height: 52px; border-radius: 16px; background: linear-gradient(135deg, var(--gold), #c4862a); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; box-shadow: 0 8px 20px rgba(201,161,74,.25); }
    .rp-title { font-size: 24px; font-weight: 800; color: var(--ink); letter-spacing: -.3px; margin-bottom: 2px; }
    .rp-subtitle { font-size: 13px; color: var(--muted); }

    .rp-progress-row { position: relative; display: flex; align-items: center; gap: 12px; }
    .rp-progress { flex: 1; height: 6px; background: rgba(255,255,255,.08); border-radius: 99px; overflow: hidden; }
    .rp-progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #e8c97a); border-radius: 99px; transition: width .6s ease; }
    .rp-progress-pct { font-size: 12px; font-weight: 700; color: var(--gold); min-width: 34px; text-align: right; }

    /* ── Translation picker ── */
    .rp-translation { display: flex; gap: 7px; margin-bottom: 18px; flex-wrap: wrap; }
    .rp-trans-btn { border: 1px solid var(--glass-border); background: rgba(255,255,255,.04); color: var(--muted); font-size: 12px; font-weight: 700; padding: 7px 15px; border-radius: 999px; cursor: pointer; transition: all .2s; }
    .rp-trans-btn.active, .rp-trans-btn:hover { background: var(--gold); border-color: var(--gold); color: #2a1d05; }

    /* ── Scripture card ── */
    .rp-scripture { background: linear-gradient(160deg, rgba(255,255,255,.07), rgba(255,255,255,.02)); border: 1px solid var(--glass-border); border-radius: 22px; padding: 28px 24px; margin-bottom: 18px; max-height: 56vh; overflow-y: auto; }
    .rp-ref { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--gold); margin-bottom: 18px; text-transform: uppercase; letter-spacing: .06em; }
    .rp-ref::before { content: ""; width: 18px; height: 1.5px; background: var(--gold); border-radius: 2px; opacity: .6; }
    .rp-verse { display: flex; gap: 12px; margin-bottom: 14px; line-height: 1.75; }
    .rp-verse-num { flex-shrink: 0; font-size: 10.5px; font-weight: 700; color: var(--gold); padding-top: 5px; min-width: 20px; text-align: right; opacity: .8; }
    .rp-verse-text { font-size: 16px; color: var(--ink); font-family: var(--serif, Georgia, serif); }

    .rp-loading { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 14px; }
    .rp-unavailable { text-align: center; padding: 20px; }
    .rp-unavailable-icon { font-size: 28px; margin-bottom: 12px; opacity: .6; }
    .rp-unavailable p { color: var(--muted); font-size: 13.5px; line-height: 1.5; }

    /* ── Nav buttons ── */
    .rp-nav { display: flex; gap: 10px; margin-bottom: 16px; }
    .rp-nav-btn { flex: 1; padding: 14px; border: 1px solid var(--glass-border); background: rgba(255,255,255,.04); color: var(--ink); font-size: 14px; font-weight: 700; border-radius: 14px; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .rp-nav-btn:hover { background: rgba(255,255,255,.08); }
    .rp-nav-btn.primary { background: var(--gold); border-color: var(--gold); color: #2a1d05; }
    .rp-nav-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Tomorrow preview ── */
    .rp-tomorrow { display: flex; align-items: center; gap: 12px; padding: 16px 18px; background: rgba(255,255,255,.03); border: 1px solid var(--glass-border); border-radius: 16px; }
    .rp-tomorrow-icon { width: 34px; height: 34px; border-radius: 10px; background: rgba(201,161,74,.12); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .rp-tomorrow-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); font-weight: 700; margin-bottom: 2px; }
    .rp-tomorrow-ref { font-size: 14px; font-weight: 700; color: var(--ink); }
  </style>
</head>
<body class="page-scroll">
  <div class="ambient">
    <div class="ambient-blob ambient-blob--a"></div>
    <div class="ambient-blob ambient-blob--b"></div>
    <div class="ambient-blob ambient-blob--c"></div>
    <div class="ambient-grain"></div>
  </div>

  <div class="topbar">
    <div class="brand">
      <img class="logo" src="/logo.png" alt="" width="32" height="32" />
      <span>Simply Manna</span>
    </div>
    <nav class="page-nav">
      <a href="/index.html" class="page-nav-link">For You</a>
      <a href="/home.html" class="page-nav-link">Home</a>
      <a href="/reading-plan.html" class="page-nav-link active">Reading</a>
      <a href="/upgrade.html" class="page-nav-link">Premium</a>
      <a href="/donate.html" class="page-nav-link">Donate</a>
    </nav>
    <div class="topbar-right">
      <button class="account-btn" id="accountBtn"></button>
    </div>
  </div>

  <div class="rp-wrap">
    <div class="rp-hero">
      <div class="rp-hero-top">
        <div class="rp-day-badge" id="dayBadge">Day —</div>
        <div class="rp-streak"><span class="rp-streak-flame">🔥</span><span id="streakLabel">—</span></div>
      </div>

      <div class="rp-book-row">
        <div class="rp-book-icon" id="bookIcon">📖</div>
        <div>
          <div class="rp-title" id="bookTitle">Daily Scripture</div>
          <p class="rp-subtitle">Read through the Bible — one chapter a day</p>
        </div>
      </div>

      <div class="rp-progress-row">
        <div class="rp-progress"><div class="rp-progress-fill" id="progressFill" style="width:0%"></div></div>
        <div class="rp-progress-pct" id="progressPct">0%</div>
      </div>
    </div>

    <div class="rp-translation" id="translationPicker">
      <button class="rp-trans-btn active" data-t="ESV">ESV</button>
      <button class="rp-trans-btn" data-t="NIV">NIV</button>
      <button class="rp-trans-btn" data-t="KJV">KJV</button>
      <button class="rp-trans-btn" data-t="NLT">NLT</button>
      <button class="rp-trans-btn" data-t="NASB">NASB</button>
    </div>

    <div id="scripture" class="rp-scripture">
      <div class="rp-loading">Loading today's reading…</div>
    </div>

    <div class="rp-nav">
      <button class="rp-nav-btn" id="prevBtn">← Previous</button>
      <button class="rp-nav-btn primary" id="nextBtn">Next Chapter →</button>
    </div>

    <div class="rp-tomorrow">
      <div class="rp-tomorrow-icon">✦</div>
      <div>
        <div class="rp-tomorrow-label">Tomorrow</div>
        <div class="rp-tomorrow-ref" id="tomorrowRef">—</div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="/index.html" class="bottom-nav-item"><div class="bottom-nav-label">For You</div></a>
    <a href="/home.html" class="bottom-nav-item"><div class="bottom-nav-label">Home</div></a>
    <a href="/reading-plan.html" class="bottom-nav-item active"><div class="bottom-nav-label">Reading</div></a>
    <a href="/leaderboard.html" class="bottom-nav-item"><div class="bottom-nav-label">Leaderboard</div></a>
    <a href="/donate.html" class="bottom-nav-item"><div class="bottom-nav-label">Donate</div></a>
    <a href="/upgrade.html" class="bottom-nav-item"><div class="bottom-nav-label">Premium</div></a>
  </nav>

  <div id="welcome"></div>

  <script type="module">
    import { initPageAccount } from "/src/core/pageAccount.js";
    initPageAccount(document.getElementById("accountBtn"));

    const BOOK_ICONS = {
      Genesis: "🌱", Exodus: "🔥", Psalms: "🎵", Proverbs: "💡",
      Isaiah: "👁️", Matthew: "👑", John: "❤️", Romans: "✉️", Revelation: "⚡",
    };

    const TRANSLATIONS = ["ESV","NIV","KJV","NLT","NASB"];
    let currentTranslation = localStorage.getItem("rp-translation") || "ESV";
    let currentDay = parseInt(localStorage.getItem("rp-day") || "0") || null;

    async function loadStreak() {
      try {
        const res = await fetch("/api/streak", { credentials: "same-origin" });
        if (!res.ok) return;
        const data = await res.json();
        document.getElementById("streakLabel").textContent = `${data.current || 0} day${data.current === 1 ? "" : "s"}`;
      } catch (_) { /* not logged in — leave placeholder */ }
    }

    async function load(day, translation) {
      const scriptureEl = document.getElementById("scripture");
      scriptureEl.innerHTML = `<div class="rp-loading">Loading…</div>`;
      const prevBtn = document.getElementById("prevBtn");
      prevBtn.disabled = true;
      document.getElementById("nextBtn").disabled = true;

      const params = new URLSearchParams({ translation });
      if (day) params.set("day", day);
      const res = await fetch(`/api/reading-plans/daily?${params}`);
      if (!res.ok) {
        scriptureEl.innerHTML = `<div class="rp-loading" style="color:var(--muted)">Couldn't load reading. Check your connection.</div>`;
        return;
      }
      const data = await res.json();

      currentDay = data.day;
      localStorage.setItem("rp-day", currentDay);

      const pct = (data.day / data.total * 100);
      document.getElementById("dayBadge").textContent = `Day ${data.day} of ${data.total}`;
      document.getElementById("progressFill").style.width = `${pct.toFixed(1)}%`;
      document.getElementById("progressPct").textContent = `${Math.round(pct)}%`;
      document.getElementById("tomorrowRef").textContent = data.tomorrow.reference;

      const bookName = data.today.book || data.today.reference.split(" ").slice(0, -1).join(" ");
      document.getElementById("bookTitle").textContent = bookName || "Daily Scripture";
      document.getElementById("bookIcon").textContent = BOOK_ICONS[bookName] || "📖";

      prevBtn.disabled = currentDay <= 1;
      document.getElementById("nextBtn").disabled = false;

      const ref = data.today.reference;
      const verses = data.today.verses;
      if (!verses || verses.length === 0) {
        scriptureEl.innerHTML = `
          <div class="rp-ref">${ref}</div>
          <div class="rp-unavailable">
            <div class="rp-unavailable-icon">📜</div>
            <p>This translation isn't available for ${ref} yet — try <strong style="color:var(--ink)">ESV</strong> or <strong style="color:var(--ink)">KJV</strong>, which have the fullest coverage.</p>
          </div>`;
        return;
      }
      scriptureEl.innerHTML = `
        <div class="rp-ref">${ref} · ${translation}</div>
        ${verses.map(v => `
          <div class="rp-verse">
            <span class="rp-verse-num">${v.number}</span>
            <span class="rp-verse-text">${v.text}</span>
          </div>
        `).join("")}
      `;
      scriptureEl.scrollTop = 0;
    }

    document.getElementById("translationPicker").querySelectorAll(".rp-trans-btn").forEach(btn => {
      if (btn.dataset.t === currentTranslation) btn.classList.add("active");
      else btn.classList.remove("active");
      btn.addEventListener("click", () => {
        document.querySelectorAll(".rp-trans-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentTranslation = btn.dataset.t;
        localStorage.setItem("rp-translation", currentTranslation);
        load(currentDay, currentTranslation);
      });
    });

    document.getElementById("nextBtn").addEventListener("click", () => {
      load(currentDay + 1, currentTranslation);
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      if (currentDay > 1) load(currentDay - 1, currentTranslation);
    });

    load(currentDay, currentTranslation);
    loadStreak();
  </script>
</body>
</html>

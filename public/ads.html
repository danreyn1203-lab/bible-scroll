<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Advertise — Taste Manna</title>
  <link rel="icon" href="/assets/logo-64.png" type="image/png" />
  <link rel="stylesheet" href="/styles.css">
  <style>
    .ads-container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    .ads-hero { text-align: center; margin-bottom: 40px; }
    .ads-title { font-size: 32px; font-weight: 700; background: linear-gradient(135deg, var(--gold), #667eea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 12px; }
    .ads-sub { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
    .ads-tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--glass-border); padding-bottom: 12px; }
    .ads-tab { padding: 8px 16px; cursor: pointer; border: 0; background: transparent; color: var(--muted); font-weight: 600; border-bottom: 2px solid transparent; transition: all .2s; }
    .ads-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .ads-panel { display: none; }
    .ads-panel.active { display: block; }
    .pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .pricing-card { background: linear-gradient(135deg, rgba(102,126,234,.1), rgba(118,75,162,.1)); border: 2px solid rgba(201,161,74,.2); border-radius: 16px; padding: 24px; text-align: center; cursor: pointer; transition: all .2s; }
    .pricing-card:hover { border-color: var(--gold); background: linear-gradient(135deg, rgba(102,126,234,.15), rgba(118,75,162,.15)); transform: translateY(-4px); }
    .pricing-card.selected { border-color: var(--gold); background: linear-gradient(135deg, rgba(102,126,234,.2), rgba(118,75,162,.2)); }
    .pricing-name { font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
    .pricing-price { font-size: 28px; font-weight: 800; color: var(--gold); margin-bottom: 8px; }
    .pricing-period { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
    .pricing-features { text-align: left; font-size: 12px; color: var(--muted); line-height: 1.8; }
    .pricing-features li { margin-bottom: 6px; }
    .pricing-features li:before { content: "✓ "; color: var(--gold); font-weight: 700; }
    .ad-form { background: rgba(255,255,255,.03); border: 1px solid var(--glass-border); border-radius: 12px; padding: 24px; margin-top: 20px; }
    .ad-form-group { margin-bottom: 16px; }
    .ad-form-label { display: block; font-weight: 600; color: var(--ink); font-size: 13px; margin-bottom: 6px; }
    .ad-form-input, .ad-form-textarea { width: 100%; background: rgba(255,255,255,.05); border: 1px solid var(--glass-border); border-radius: 8px; padding: 10px 12px; color: var(--ink); font-size: 13px; outline: none; font-family: inherit; }
    .ad-form-textarea { resize: vertical; min-height: 100px; }
    .ad-form-input:focus, .ad-form-textarea:focus { border-color: var(--gold); background: rgba(255,255,255,.08); }
    .btn-primary { background: var(--gold); color: #2a1d05; border: 0; padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .my-ads-list { display: grid; gap: 12px; }
    .ad-item { background: rgba(255,255,255,.03); border: 1px solid var(--glass-border); border-radius: 12px; padding: 16px; }
    .ad-item-head { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; }
    .ad-item-title { font-weight: 700; color: var(--ink); }
    .ad-item-status { font-size: 11px; padding: 4px 8px; border-radius: 6px; background: rgba(102,126,234,.2); color: #667eea; text-transform: uppercase; }
    .ad-item-stat { display: flex; gap: 20px; font-size: 12px; color: var(--muted); margin-bottom: 12px; }
    .ad-item-stat-value { font-weight: 700; color: var(--ink); }
    .empty { text-align: center; padding: 40px; color: var(--muted); }
    .success-box { background: rgba(37,211,102,.1); border: 1px solid rgba(37,211,102,.3); border-radius: 12px; padding: 16px; margin-bottom: 20px; color: #7ac57a; }
  </style>
</head>
<body class="page-scroll">
  <div class="ambient">
    <div class="ambient-blob ambient-blob--a"></div>
    <div class="ambient-blob ambient-blob--b"></div>
    <div class="ambient-blob ambient-blob--c"></div>
    <div class="ambient-grain"></div>
  </div>

  <div class="topbar">
    <div class="brand">
      <img class="logo" src="/logo.png" alt="" width="32" height="32" />
      <span>Taste Manna</span>
    </div>
    <nav class="page-nav">
      <a href="/index.html" class="page-nav-link">For You</a>
      <a href="/home.html" class="page-nav-link">Home</a>
      <a href="/leaderboard.html" class="page-nav-link">Leaderboard</a>
      <a href="/upgrade.html" class="page-nav-link">Premium</a>
      <a href="/donate.html" class="page-nav-link">Donate</a>
    </nav>
    <div class="topbar-right">
      <button class="account-btn" id="accountBtn"></button>
    </div>
  </div>

  <div class="ads-container main-with-nav" style="padding-top: 80px;">
    <div class="ads-hero">
      <div class="ads-title">📢 Advertise with Taste Manna</div>
      <div class="ads-sub">Reach your audience. Boost your message. Simple pricing.</div>
    </div>

    <div id="successMessage" style="display: none;"></div>

    <div class="ads-tabs">
      <button class="ads-tab active" data-panel="create">Create Ad</button>
      <button class="ads-tab" data-panel="my-ads">My Ads</button>
    </div>

    <!-- Create Ad Panel -->
    <div class="ads-panel active" id="panel-create">
      <h2 style="font-size: 18px; font-weight: 700; margin-bottom: 20px;">Select Your Plan</h2>
      <div class="pricing-grid" id="pricingGrid"></div>

      <div class="ad-form">
        <h3 style="font-size: 16px; font-weight: 700; margin-bottom: 16px;">Your Message</h3>

        <div class="ad-form-group">
          <label class="ad-form-label">Title *</label>
          <input type="text" id="adTitle" class="ad-form-input" placeholder="Make it catchy" maxlength="100" required>
        </div>

        <div class="ad-form-group">
          <label class="ad-form-label">Description *</label>
          <textarea id="adBody" class="ad-form-textarea" placeholder="Tell your story..." maxlength="500" required></textarea>
        </div>

        <div class="ad-form-group">
          <label class="ad-form-label">Image URL (optional)</label>
          <input type="url" id="adMedia" class="ad-form-input" placeholder="https://example.com/image.jpg">
        </div>

        <div class="ad-form-group">
          <label class="ad-form-label">Link (optional)</label>
          <input type="url" id="adLink" class="ad-form-input" placeholder="https://yourwebsite.com">
        </div>

        <button class="btn-primary" id="checkoutBtn" disabled>
          <span id="checkoutText">Select a plan first</span>
        </button>
      </div>
    </div>

    <!-- My Ads Panel -->
    <div class="ads-panel" id="panel-my-ads">
      <h2 style="font-size: 18px; font-weight: 700; margin-bottom: 20px;">Your Advertisements</h2>
      <div class="my-ads-list" id="myAdsList"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="/index.html" class="bottom-nav-item"><div class="bottom-nav-label">For You</div></a>
    <a href="/home.html" class="bottom-nav-item"><div class="bottom-nav-label">Home</div></a>
    <a href="/leaderboard.html" class="bottom-nav-item"><div class="bottom-nav-label">Leaderboard</div></a>
    <a href="/upgrade.html" class="bottom-nav-item"><div class="bottom-nav-label">Premium</div></a>
    <a href="/donate.html" class="bottom-nav-item"><div class="bottom-nav-label">Donate</div></a>
  </nav>

  <div id="welcome"></div>

  <script type="module">
    import { initPageAccount } from "/src/core/pageAccount.js";
    let selectedTier = null;
    let pageAccount = null;

    // Tab switching
    document.querySelectorAll('.ads-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.ads-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.ads-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`panel-${tab.dataset.panel}`).classList.add('active');
        if (tab.dataset.panel === 'my-ads') loadMyAds();
      });
    });

    // Load pricing tiers
    let paymentEnabled = false;
    async function loadPricing() {
      try {
        const res = await fetch('/api/ads/pricing');
        const data = await res.json();
        paymentEnabled = !!data.paymentEnabled;

        if (!paymentEnabled) {
          document.getElementById('successMessage').innerHTML = '<div style="padding: 12px 16px; background: rgba(217,104,104,.1); border: 1px solid rgba(217,104,104,.3); border-radius: 10px; color: #ffb3b3; font-size: 13px; margin-bottom: 16px;">⚠️ Payments aren\'t configured on this server yet — you can preview plans below, but checkout is disabled.</div>';
          document.getElementById('successMessage').style.display = 'block';
        }

        const grid = document.getElementById('pricingGrid');
        grid.innerHTML = data.tiers.map(tier => {
          const price = (tier.amountCents / 100).toFixed(2);
          return `
            <div class="pricing-card" data-tier="${tier.id}">
              <div class="pricing-name">${tier.label}</div>
              <div class="pricing-price">$${price}</div>
              <div class="pricing-period">${tier.durationDays} days</div>
              <ul class="pricing-features">
                <li>~${(tier.amountCents < 1000 ? 5000 : tier.amountCents < 2000 ? 20000 : 50000).toLocaleString()} impressions</li>
                <li>${tier.durationDays}-day campaign</li>
                <li>Analytics included</li>
              </ul>
            </div>
          `;
        }).join('');

        grid.querySelectorAll('.pricing-card').forEach(card => {
          card.addEventListener('click', () => {
            const tier = data.tiers.find(t => t.id === card.dataset.tier);
            selectTier(card.dataset.tier, tier.amountCents / 100);
          });
        });
      } catch (err) {
        console.error('Error loading pricing:', err);
        document.getElementById('pricingGrid').innerHTML = '<div style="grid-column: 1/-1; padding: 20px; color: #ff8a8a;">Error loading pricing tiers</div>';
      }
    }

    function selectTier(tierId, price) {
      selectedTier = tierId;
      document.querySelectorAll('.pricing-card').forEach(c => c.classList.remove('selected'));
      document.querySelector(`[data-tier="${tierId}"]`).classList.add('selected');
      document.getElementById('checkoutBtn').disabled = !paymentEnabled;
      document.getElementById('checkoutText').textContent = paymentEnabled
        ? `Pay $${price.toFixed(2)} - Create Ad`
        : 'Checkout disabled (Stripe not configured)';
    }

    // Checkout
    document.getElementById('checkoutBtn').addEventListener('click', async () => {
      const session = pageAccount ? await pageAccount.getSession() : null;
      if (!session?.user) {
        const { openAuthPanel } = await import("/src/ui/components/welcome.js");
        openAuthPanel({ mode: "login", dismissible: true });
        return;
      }

      const title = document.getElementById('adTitle').value.trim();
      const body = document.getElementById('adBody').value.trim();
      const mediaUrl = document.getElementById('adMedia').value.trim();
      const linkUrl = document.getElementById('adLink').value.trim();

      if (!title || !body) {
        alert('Please fill in title and description');
        return;
      }

      if (!selectedTier) {
        alert('Please select a plan');
        return;
      }

      try {
        const btn = document.getElementById('checkoutBtn');
        btn.disabled = true;
        btn.textContent = 'Redirecting to payment...';

        const res = await fetch('/api/ads/checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ tierId: selectedTier, title, body, mediaUrl: mediaUrl || null, linkUrl: linkUrl || null }),
        });

        const data = await res.json();
        if (data.url) {
          window.location.href = data.url;
        } else {
          alert('Error: ' + data.error);
          btn.disabled = false;
          btn.textContent = 'Try again';
        }
      } catch (err) {
        alert('Error: ' + err.message);
        document.getElementById('checkoutBtn').disabled = false;
      }
    });

    // Load my ads
    async function loadMyAds() {
      try {
        const res = await fetch('/api/ads/my-ads', { credentials: 'same-origin' });
        const data = await res.json();

        const list = document.getElementById('myAdsList');
        if (!data.ads || data.ads.length === 0) {
          list.innerHTML = '<div class="empty">No ads yet. Create your first ad above!</div>';
          return;
        }

        list.innerHTML = data.ads.map(ad => `
          <div class="ad-item">
            <div class="ad-item-head">
              <div class="ad-item-title">${ad.title}</div>
              <div class="ad-item-status">${ad.status}</div>
            </div>
            <div class="ad-item-stat">
              <div>👁️ <span class="ad-item-stat-value">${ad.impressions}</span> impressions</div>
              <div>👆 <span class="ad-item-stat-value">${ad.clicks}</span> clicks</div>
              <div>💰 <span class="ad-item-stat-value">$${(ad.amountCents / 100).toFixed(2)}</span></div>
            </div>
            <div style="font-size: 12px; color: var(--muted);">
              ${ad.startsAt ? `Active: ${new Date(ad.startsAt).toLocaleDateString()} - ${new Date(ad.endsAt).toLocaleDateString()}` : 'Awaiting payment'}
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.error('Error loading ads:', err);
      }
    }

    // Check for success
    const params = new URLSearchParams(window.location.search);
    if (params.get('success')) {
      document.getElementById('successMessage').innerHTML = '<div class="success-box">✅ Payment received! Your ad will be live shortly.</div>';
      document.getElementById('successMessage').style.display = 'block';
      window.history.replaceState({}, document.title, '/ads.html');
    }

    pageAccount = await initPageAccount(document.getElementById('accountBtn'));
    loadPricing();
    const session = await pageAccount.getSession();
    if (session?.user) loadMyAds();
  </script>
</body>
</html>
